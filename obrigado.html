  <style>
    .ty-page {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      background: var(--bg);
    }

    .ty-card {
      max-width: 480px;
      width: 100%;
      background: var(--glass-bg);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      border: 1px solid var(--glass-border);
      border-top-color: var(--glass-border-t);
      box-shadow: var(--glass-shadow);
      border-radius: 24px;
      padding: 52px 44px;
      text-align: center;
      position: relative;
      overflow: hidden;
      animation: fadeUp .6s ease both;
    }

    .ty-card::before {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 320px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(194,123,154,0.45), transparent);
    }

    .ty-check {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: rgba(194,123,154,0.10);
      border: 1px solid rgba(194,123,154,0.22);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 28px;
      animation: scalePop .5s .2s cubic-bezier(.34,1.56,.64,1) both;
    }

    .ty-check svg {
      width: 30px; height: 30px;
      color: var(--gold);
    }

    @keyframes scalePop {
      from { transform: scale(.6); opacity: 0; }
      to   { transform: scale(1);  opacity: 1; }
    }

    .ty-label {
      margin-bottom: 20px;
    }

    .ty-title {
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(28px, 6vw, 40px);
      font-weight: 600;
      letter-spacing: -.02em;
      color: var(--heading);
      line-height: 1.15;
      margin-bottom: 16px;
    }

    .ty-body {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.75;
      margin-bottom: 10px;
    }

    .ty-time {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      font-weight: 500;
      color: var(--gold);
      background: rgba(194,123,154,0.08);
      border: 1px solid rgba(194,123,154,0.18);
      border-radius: 100px;
      padding: 6px 14px;
      margin: 18px 0 32px;
    }
    :root[data-theme="light"] .ty-time {
      background: rgba(194,123,154,0.07);
      border-color: rgba(194,123,154,0.18);
    }

    .ty-time svg {
      width: 13px; height: 13px;
      flex-shrink: 0;
    }

    .ty-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn-whatsapp {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      background: #25d366;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 15px 32px;
      font-family: 'Montserrat', sans-serif;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: opacity .2s, transform .15s, box-shadow .2s;
      box-shadow: 0 4px 24px rgba(37,211,102,0.28);
    }
    .btn-whatsapp:hover {
      opacity: .90;
      transform: translateY(-2px);
      box-shadow: 0 8px 36px rgba(37,211,102,0.40);
    }
    .btn-whatsapp svg { width: 20px; height: 20px; flex-shrink: 0; }

    .btn-back {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: none;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 32px;
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      transition: color .2s, border-color .2s;
    }
    .btn-back:hover {
      color: var(--heading);
      border-color: rgba(194,123,154,0.35);
    }
    .btn-back svg { width: 15px; height: 15px; flex-shrink: 0; }

    @media (max-width: 480px) {
      .ty-card { padding: 40px 24px; }
    }
  </style>
